services:

  gateway:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    deploy:
      replicas: 1

  auth-service:
    image: auth-service:latest
    expose:
      - "8080"
    deploy:
      replicas: 1

  course-service:
    image: course-service:latest
    expose:
      - "8081"
    deploy:
      replicas: 1

  seat-service:
    image: seat-service:latest
    expose:
      - "8082"
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      replicas: 1
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    deploy:
      replicas: 1