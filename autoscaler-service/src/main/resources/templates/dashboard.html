<!DOCTYPE html>
<html>
<head>
    <title>Autoscaling Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0e27; color: #fff; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; text-align: center; }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .service-card { background: #1a1f3a; border-radius: 10px; padding: 20px; border: 2px solid #2d3561; }
        .service-name { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #667eea; }
        .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2d3561; }
        .metric-label { color: #8b92b8; }
        .metric-value { font-weight: bold; color: #fff; }
        .events { background: #1a1f3a; border-radius: 10px; padding: 20px; }
        .event { background: #0f1329; margin: 10px 0; padding: 15px; border-radius: 5px; border-left: 4px solid #667eea; }
        .event-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .event-service { font-weight: bold; color: #667eea; }
        .event-time { color: #8b92b8; font-size: 12px; }
        .event-step { color: #ffd700; font-weight: bold; margin-bottom: 8px; }
        .event-data { color: #b8bfdb; font-size: 14px; }
        .scale-out { border-left-color: #ff6b6b; }
        .scale-in { border-left-color: #51cf66; }
        .no-action { border-left-color: #8b92b8; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-out { background: #ff6b6b; }
        .badge-in { background: #51cf66; }
        .badge-idle { background: #8b92b8; }
        h2 { margin-bottom: 15px; color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Intelligent Autoscaling Dashboard</h1>
        <p>Real-time monitoring of MFDS + FPR algorithms</p>
    </div>
    <div class="container">
        <h2>Service Metrics</h2>
        <div class="services" id="services"></div>
        <h2>Autoscaling Events</h2>
        <div class="events" id="events"></div>
    </div>
    <script>
        const services = ['auth-service', 'course-service', 'seat-service'];
        const serviceData = {};
        
        function updateDashboard() {
            fetch('/api/events')
                .then(r => r.json())
                .then(events => {
                    events.forEach(e => {
                        if (!serviceData[e.service]) serviceData[e.service] = {};
                        Object.assign(serviceData[e.service], e.data);
                    });
                    
                    document.getElementById('services').innerHTML = services.map(s => {
                        const d = serviceData[s] || {};
                        return `<div class="service-card">
                            <div class="service-name">${s}</div>
                            <div class="metric"><span class="metric-label">Replicas</span><span class="metric-value">${d.replicas || 1}</span></div>
                            <div class="metric"><span class="metric-label">Latency</span><span class="metric-value">${(d.latency || 0).toFixed(3)}s</span></div>
                            <div class="metric"><span class="metric-label">Arrival Rate (λ)</span><span class="metric-value">${(d.arrivalRate || 0).toFixed(2)}/s</span></div>
                            <div class="metric"><span class="metric-label">Delta (Δλ)</span><span class="metric-value">${(d.delta || 0).toFixed(2)}</span></div>
                            <div class="metric"><span class="metric-label">Utilization (ρ)</span><span class="metric-value">${(d.rho || 0).toFixed(2)}</span></div>
                            <div class="metric"><span class="metric-label">Action</span><span class="metric-value">${d.action || 'NO_ACTION'}</span></div>
                        </div>`;
                    }).join('');
                    
                    document.getElementById('events').innerHTML = events.slice(-20).reverse().map(e => {
                        const cls = e.step.includes('SCALE OUT') ? 'scale-out' : e.step.includes('SCALE IN') ? 'scale-in' : 'no-action';
                        const badge = e.step.includes('SCALE OUT') ? 'badge-out' : e.step.includes('SCALE IN') ? 'badge-in' : 'badge-idle';
                        return `<div class="event ${cls}">
                            <div class="event-header">
                                <span class="event-service">${e.service}</span>
                                <span class="event-time">${new Date(e.timestamp).toLocaleTimeString()}</span>
                            </div>
                            <div class="event-step"><span class="badge ${badge}">${e.step}</span></div>
                            <div class="event-data">${JSON.stringify(e.data, null, 2)}</div>
                        </div>`;
                    }).join('');
                });
        }
        
        updateDashboard();
        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
