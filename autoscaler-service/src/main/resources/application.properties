spring.application.name=autoscaler-service
server.port=8083
server.address=0.0.0.0
prometheus.base-url=http://localhost:9090

# Evaluate every 30s — matches Prometheus scrape interval
scaling.interval.ms=30000

# Each replica handles ~10 req/s (100ms Thread.sleep = 10 req/s max)
scaling.requests-per-replica=10.0

# W just above 100ms baseline = idle; W > 800ms = queuing is significant
sla.tmin=0.15
sla.tmax=0.8
